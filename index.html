<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민주쌤과 함께하는 국어 B 설명 방법 마스터 퀴즈😄</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; width: 90%; max-width: 600px; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .timer-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }
        .question { font-size: 1.2rem; font-weight: 700; color: #2c3e50; margin-bottom: 1.5rem; line-height: 1.6; min-height: 3.5em; word-break: keep-all; white-space: pre-wrap; }
        .options { display: grid; gap: 0.8rem; }
        button { padding: 1rem; border: 2px solid #edf2f7; border-radius: 12px; background: white; cursor: pointer; transition: all 0.2s; font-size: 1rem; text-align: left; color: #4a5568; outline: none; }
        button:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        button:disabled { cursor: default; }
        .correct { background-color: #d1fae5 !important; border-color: var(--success) !important; color: #065f46; font-weight: bold; }
        .wrong { background-color: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b; }
        #explanation { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 10px; display: none; font-size: 0.95rem; border-left: 4px solid var(--primary); line-height: 1.5; color: #334155; }
        #next-btn { width: 100%; margin-top: 1.5rem; padding: 1rem; background: #2c3e50; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; }
        #result-area { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 2rem auto; font-size: 2.5rem; font-weight: bold; box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3); }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-area">
        <div class="header">
            <span id="progress-text" style="font-weight: bold; color: #64748b;">문제 1 / 10</span>
            <span id="timer-text" style="font-weight: bold; color: var(--primary);">남은 시간: 20초</span>
        </div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
        <div class="question" id="question">문제를 불러오는 중...</div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" onclick="handleNext()">다음 문제로 →</button>
    </div>
    
    <div id="result-area">
        <h1>🎮 학습 완료!</h1>
        <div class="score-circle">
            <span id="final-score">0</span>
            <span style="font-size: 1.2rem;">점</span>
        </div>
        <p id="feedback-msg" style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; color: #475569;"></p>
        <button onclick="location.reload()" style="background:var(--primary); color:white; width:100%; padding: 1rem; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem;">다시 도전하기</button>
    </div>
</div>

<script>
    const rawData = [
        // 기존 핵심 문제 (16문항)
        { q: "두 대상 사이의 '공통점'을 중심으로 설명하는 방법은?", a: ["비교", "대조", "분류", "정의"], correct: 0, exp: "비교는 공통점을 찾아내는 방식입니다." },
        { q: "두 대상 사이의 '차이점'을 중심으로 설명하는 방법은?", a: ["비교", "대조", "분석", "구분"], correct: 1, exp: "대조는 차이점을 드러내어 대비시키는 방식입니다." },
        { q: "'축구와 농구는 모두 팀워크가 중요한 구기 종목이다'에 쓰인 방법은?", a: ["비교", "대조", "예시", "인과"], correct: 0, exp: "공통점을 말하고 있으므로 비교입니다." },
        { q: "'시는 운율이 있지만 소설은 운율이 없는 산문이다'에 쓰인 방법은?", a: ["비교", "대조", "분류", "정의"], correct: 1, exp: "차이점을 강조하고 있으므로 대조입니다." },
        { q: "상위 개념을 일정한 기준에 따라 하위 항목으로 '나누는' 방법은?", a: ["분류", "구분", "분석", "정의"], correct: 1, exp: "기준에 따라 나누는 것은 구분입니다." },
        { q: "여러 대상을 일정한 기준에 따라 종류별로 '묶어서' 설명하는 방법은?", a: ["분류", "구분", "인과", "예시"], correct: 0, exp: "종류별로 묶는 것은 분류입니다." },
        { q: "'악기는 연주 방식에 따라 현악기, 관악기, 타악기로 나눌 수 있다'의 방법은?", a: ["분류", "구분", "분석", "정의"], correct: 1, exp: "종류별로 나누고 있으므로 구분입니다." },
        { q: "'고래, 개, 호랑이는 모두 포유류로 묶을 수 있다'에 쓰인 방법은?", a: ["구분", "분류", "대조", "비교"], correct: 1, exp: "포유류라는 범주로 묶고 있으므로 분류입니다." },
        { q: "'시계는 시침, 분침, 초침으로 이루어져 있다'에 쓰인 방법은?", a: ["구분", "분류", "분석", "정의"], correct: 2, exp: "구성 부분으로 쪼개어 설명하는 분석입니다." },
        { q: "분석과 구분의 차이점으로 옳은 것은?", a: ["분석은 공통점을 찾고 구분은 차이점을 찾는다.", "분석은 구조적 부분으로 쪼개고 구분은 종류별로 나눈다.", "분석은 묶는 것이고 구분은 나누는 것이다.", "두 방법은 완전히 동일하다."], correct: 1, exp: "분석은 하나를 쪼개는 것, 구분은 종류를 나누는 것입니다." },
        { q: "'문학이란 인간의 삶을 언어로 표현한 예술이다'에 쓰인 방법은?", a: ["정의", "예시", "인과", "비교"], correct: 0, exp: "뜻을 명확히 규정하는 정의입니다." },
        { q: "'예를 들어 고전 소설에는 심청전, 흥부전 등이 있다'에 쓰인 방법은?", a: ["정의", "예시", "분류", "구분"], correct: 1, exp: "사례를 보여주는 예시입니다." },
        { q: "'열심히 공부했기 때문에 좋은 성적을 받았다'에 쓰인 방법은?", a: ["인과", "분석", "비교", "정의"], correct: 0, exp: "원인과 결과의 관계인 인과입니다." },
        { q: "다음 중 '비교'의 효과로 가장 적절한 것은?", a: ["대상의 차이점을 부각한다.", "대상을 종류별로 묶는다.", "익숙한 것과의 공통점을 통해 이해를 돕는다.", "대상의 구조를 쪼개어 보여준다."], correct: 2, exp: "비교는 공통점을 활용해 친숙함을 줍니다." },
        { q: "분류와 구분을 구별하는 가장 핵심적인 기준은?", a: ["공통점인가 차이점인가", "부분인가 전체인가", "묶는 것인가 나누는 것인가", "뜻풀이인가 사례인가"], correct: 2, exp: "묶으면 분류, 나누면 구분입니다." },
        { q: "'복잡한 개념을 구체적인 사례를 들어 설명하는 방법'은?", a: ["정의", "예시", "비교", "대조"], correct: 1, exp: "실례를 드는 예시입니다." },

        // 신규 실전 예문 문제 (7문항)
        { q: "다음 문장에 사용된 설명 방법은?\n'피지가 피부 밖으로 배출되지 못해 여드름이 생기는 것이다.'", a: ["정의", "예시", "인과", "분석"], correct: 2, exp: "원인과 결과의 관계이므로 인과입니다." },
        { q: "다음 중 '분석'의 방법이 쓰인 문장은?", a: ["시계는 태엽, 초침, 분침, 시침으로 구성되어 있다.", "악기는 관악기, 타악기 등으로 나눌 수 있다.", "진달래와 철쭉은 분홍색 꽃이 피는 것이 비슷하다.", "정전기가 생기는 것은 마찰 때문이다."], correct: 0, exp: "대상을 부분으로 쪼개는 것이 분석입니다." },
        { q: "다음 두 문장에 쓰인 설명 방법은?\n(가) 인권은 인간의 기본적 권리를 말한다.\n(나) 텔레비전과 라디오는 둘 다 정보를 제공한다.", a: ["정의 - 비교", "정의 - 대조", "예시 - 분류", "인과 - 비교"], correct: 0, exp: "(가)는 정의, (나)는 공통점인 비교입니다." },
        { q: "다음 중 '분류'에 해당하는 문장은?", a: ["세금은 국세와 지방세로 나눈다.", "문학은 운문과 산문으로 나뉜다.", "자동차는 소형, 중형, 대형으로 나눈다.", "토끼, 고양이, 호랑이는 포유류이다."], correct: 3, exp: "개별 대상을 하나로 묶는 것은 분류입니다." },
        { q: "'거문고는 줄이 6개이고 가야금은 줄이 12개이다'에 쓰인 방법은?", a: ["대조", "비교", "정의", "분석"], correct: 0, exp: "차이점을 말하고 있으므로 대조입니다." },
        { q: "'악기는 소리 내는 방법에 따라 현악기, 관악기 등으로 나눌 수 있다'의 방법은?", a: ["분류", "구분", "분석", "정의"], correct: 1, exp: "전체를 기준에 따라 나누고 있으므로 구분입니다." },
        { q: "'바이올린·비올라·첼로는 현악기로 묶을 수 있다'에 쓰인 방법은?", a: ["분류", "구분", "대조", "비교"], correct: 0, exp: "하위 항목들을 상위 개념으로 묶는 분류입니다." },

        // 설명문 기초 개념 문제 (3문항)
        { q: "'설명하는 글(설명문)'의 주된 목적은?", a: ["독자를 설득하기 위해", "정보를 전달하기 위해", "감동을 주기 위해", "비판을 하기 위해"], correct: 1, exp: "설명문은 정보를 알기 쉽게 전달하는 것이 목적입니다." },
        { q: "설명문을 쓸 때의 올바른 태도는?", a: ["주관적인 의견을 강조한다.", "정확한 사실만을 바탕으로 쓴다.", "흥미를 위해 내용을 꾸며낸다.", "어려운 용어를 많이 사용한다."], correct: 1, exp: "설명문은 객관성과 정확성이 중요합니다." },
        { q: "대상에 맞는 설명 방법을 사용하는 이유는?", a: ["독자의 이해를 돕기 위해", "글을 길게 쓰기 위해", "작가의 실력을 뽐내기 위해", "독자의 생각을 바꾸기 위해"], correct: 0, exp: "적절한 설명 방법은 정보 전달의 효율성을 높입니다." }
    ];

    let quizData = [];
    let currentIdx = 0;
    let score = 0;
    let timeLeft = 20;
    let timerInterval;
    let isAnswered = false;

    function shuffleData() {
        // 전체 문제 중 10개를 무작위로 섞어서 추출
        quizData = [...rawData].sort(() => Math.random() - 0.5).slice(0, 10);
    }

    function playSound(isCorrect) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = isCorrect ? "정답입니다" : "오답입니다";
        msg.lang = 'ko-KR';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById("timer-progress").style.width = "100%";
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            const percent = (timeLeft / 20) * 100;
            document.getElementById("timer-progress").style.width = percent + "%";
            document.getElementById("timer-text").innerText = `남은 시간: ${Math.ceil(timeLeft)}초`;
            if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(-1); }
        }, 100);
    }

    function loadQuestion() {
        isAnswered = false;
        clearInterval(timerInterval);
        const data = quizData[currentIdx];
        document.getElementById("progress-text").innerText = `문제 ${currentIdx + 1} / 10`;
        document.getElementById("question").innerText = data.q;
        document.getElementById("explanation").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        
        // 보기 셔플
        const shuffledOptions = [...data.a].sort(() => Math.random() - 0.5);
        shuffledOptions.forEach((opt) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => {
                const originalIndex = data.a.indexOf(opt);
                checkAnswer(originalIndex);
            };
            optionsDiv.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(idx) {
        if(isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);
        const data = quizData[currentIdx];
        const buttons = document.querySelectorAll(".options button");
        buttons.forEach(btn => btn.disabled = true);
        const correctText = data.a[data.correct];
        if(idx === data.correct) {
            buttons.forEach(btn => { if(btn.innerText === correctText) btn.classList.add("correct"); });
            score += 10;
            playSound(true);
        } else {
            if(idx !== -1) {
                const wrongText = data.a[idx];
                buttons.forEach(btn => { if(btn.innerText === wrongText) btn.classList.add("wrong"); });
            }
            buttons.forEach(btn => { if(btn.innerText === correctText) btn.classList.add("correct"); });
            playSound(false);
        }
        document.getElementById("explanation").innerHTML = data.exp;
        document.getElementById("explanation").style.display = "block";
        document.getElementById("next-btn").style.display = "block";
    }

    function handleNext() {
        currentIdx++;
        if(currentIdx < quizData.length) loadQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById("game-area").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        document.getElementById("final-score").innerText = score;
        let msg = score >= 90 ? "💯 완벽해요! 설명 방법의 달인이시군요!" : score >= 70 ? "👏 아주 우수합니다! 핵심 개념을 잘 파악하고 있어요." : "📖 다시 도전하며 개념을 익혀보세요!";
        document.getElementById("feedback-msg").innerText = msg;
    }

    shuffleData();
    loadQuestion();
</script>
</body>
</html>
